- type: entity
  parent: BaseHandheldInstrument
  id: Rickenbacker4003Instrument
  name: Rickenbacker
  description: Just a regular bass guitar.
  components:
  - type: Instrument
    program: 33
  - type: SwappableInstrument
    instrumentList:
      "Fingered": {33: 0}
      "Pick": {34: 0}
      "Slap": {36: 0}
      "Slap (XTra Funky)": {37: 0}
  - type: Sprite
    sprite: _DV/Objects/Fun/Instruments/rickenbacker.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _DV/Objects/Fun/Instruments/rickenbacker.rsi
  # - type: MeleeStaminaCost
  #   swing: 10
  #   wieldCoefficient: 0.40
  - type: Tag
    tags:
    - StringInstrument
  - type: MeleeWeapon
    wideAnimationRotation: -45
    soundHit:
      path: /Audio/_DV/Weapons/electricguitarhit.ogg
    damage:
      types:
        Blunt: 8
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 6

- type: entity
  parent: Rickenbacker4003Instrument
  id: Rickenbacker4001Instrument
  name: Rickenbacker
  suffix: Antag
  description: It's the climax!
  components:
  - type: MeleeWeapon
    bluntStaminaDamageFactor: 4.5
    attackRate: 1.25
    range: 1.85
    damage:
      types:
        Blunt: 8
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 7
        Shock: 2

- type: entity
  parent: SuperSynthesizerInstrument
  id: BloodRedSuperSynth
  name: blood red super synthesizer
  description: Covered in red, fitting for a track calming track in some explosive missions.
  components:
  - type: Sprite
    sprite: _DV/Objects/Fun/Instruments/redsupersynth.rsi
    state: bloodredsynth
  - type: Clothing
    quickEquip: false
    slots:
    - neck
    sprite: _DV/Objects/Fun/Instruments/redsupersynth.rsi
  - type: Item
    heldPrefix: bloodredsynth
    size: Normal
    sprite: _DV/Objects/Fun/Instruments/redsupersynth.rsi

- type: entity
