- type: entity
  parent: BaseItem
  id: BaseWhip
  abstract: true
  components:
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 2
    #heavyRateModifier: 0.5 # Redshift - unimplemented
    #heavyDamageBaseModifier: 1.75 # Redshift - unimplemented
    #heavyStaminaCost: 10 # Redshift - unimplemented
    #maxTargets: 1 # Redshift - unimplemented
    angle: 120
    animation: WeaponArcSlash
    soundHit:
      path: /Audio/_Floof/Lewd/whip.ogg
  - type: StaminaDamageOnHit
    damage: 20
  - type: StaminaDamageOnCollide
    damage: 20
  - type: StaticPrice
    price: 60
  - type: Item
    size: Normal
  - type: Tag
    tags:
     - Whip

